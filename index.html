<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game On: AP CSP through Game Design</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --volt: #C4E44A; --blue: #3070E2; --pumpkin: #F26322;
      --black: #111111; --white: #ffffff; --muted: #555555;
    }
    body { font-family: 'Jost', sans-serif; background: var(--volt); color: var(--black); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

    .screen { flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 20px; padding: 24px; overflow-y: auto; background: var(--volt); }
    .screen.active { display: flex; }
    .ua-label { font-weight: 900; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
    .screen-title { font-weight: 900; font-size: 26px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--black); text-align: center; line-height: 1.15; }
    .volt-bar { width: 48px; height: 5px; background: var(--black); border-radius: 3px; }
    .screen-sub { font-size: 14px; color: var(--muted); text-align: center; }

    .cards { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 520px; }
    .card { flex: 1; min-width: 200px; background: var(--white); border: 2px solid var(--black); border-radius: 14px; padding: 24px 20px; cursor: pointer; transition: all 0.18s; display: flex; flex-direction: column; align-items: flex-start; gap: 8px; }
    .card:hover { background: var(--blue); border-color: var(--blue); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
    .card .card-icon { font-size: 26px; }
    .card .card-label { font-weight: 900; font-size: 14px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--black); transition: color 0.18s; }
    .card .card-desc { font-size: 12px; color: var(--muted); line-height: 1.5; transition: color 0.18s; }
    .card:hover .card-label { color: var(--white); }
    .card:hover .card-desc { color: rgba(255,255,255,0.75); }

    /* CHAT */
    #chat-screen { display: none; flex-direction: column; height: 100dvh; overflow: hidden; }
    #chat-screen.active { display: flex; }
    #chat-header { padding: 11px 16px; background: var(--black); display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-shrink: 0; }
    #chat-header-left { display: flex; align-items: center; gap: 8px; min-width: 0; }
    #mode-badge { font-weight: 900; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 9px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; background: var(--volt); color: var(--black); }
    #curriculum-badge { font-weight: 700; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; padding: 3px 9px; border-radius: 20px; background: #1a1a1a; color: #555; border: 1px solid #333; white-space: nowrap; flex-shrink: 0; transition: color 0.3s; }
    #curriculum-badge.ready { color: var(--volt); }
    #chat-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .hdr-btn { background: transparent; border: 1px solid #444; border-radius: 7px; padding: 4px 9px; color: #aaa; font-size: 11px; cursor: pointer; font-family: 'Jost', sans-serif; transition: all 0.2s; white-space: nowrap; }
    .hdr-btn:hover { border-color: var(--volt); color: var(--volt); }

    #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; background: var(--volt); }
    .msg { display: flex; }
    .msg.user { justify-content: flex-end; }
    .msg-avatar { width: 28px; height: 28px; border-radius: 7px; background: var(--black); display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 9px; color: var(--volt); margin-right: 8px; margin-top: 2px; flex-shrink: 0; }
    .msg-bubble { max-width: 76%; padding: 11px 14px; border-radius: 14px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
    .msg.user .msg-bubble { background: var(--blue); color: var(--white); border-bottom-right-radius: 3px; }
    .msg.assistant .msg-bubble { background: var(--white); color: var(--black); border-bottom-left-radius: 3px; border: 1px solid rgba(0,0,0,0.1); }
    .msg-bubble pre { background: var(--black); color: #cdd6f4; border-radius: 7px; padding: 10px 12px; font-size: 12px; overflow-x: auto; margin: 8px 0; font-family: monospace; white-space: pre; }
    .msg-bubble strong { font-weight: 700; }

    #typing { display: none; align-items: center; gap: 8px; padding: 0 16px 6px; background: var(--volt); }
    #typing-avatar { width: 28px; height: 28px; border-radius: 7px; background: var(--black); display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 9px; color: var(--volt); flex-shrink: 0; }
    #typing-bubble { background: var(--white); padding: 9px 14px; border-radius: 14px; border-bottom-left-radius: 3px; display: flex; gap: 5px; align-items: center; border: 1px solid rgba(0,0,0,0.1); }
    #typing-bubble span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; display: inline-block; }
    #typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    #typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

    #suggestions { display: flex; gap: 7px; flex-wrap: wrap; padding: 0 16px 10px; background: var(--volt); }
    .suggestion { background: transparent; border: 1.5px solid var(--black); color: var(--black); border-radius: 20px; padding: 5px 12px; font-size: 12px; cursor: pointer; transition: all 0.18s; font-family: 'Jost', sans-serif; }
    .suggestion:hover { background: var(--black); color: var(--volt); }

    #input-area { padding: 10px 14px; background: var(--volt); border-top: 1px solid rgba(0,0,0,0.1); display: flex; gap: 8px; flex-shrink: 0; }
    #input { flex: 1; background: var(--white); border: 2px solid var(--black); border-radius: 11px; padding: 9px 13px; color: var(--black); font-size: 14px; resize: none; outline: none; line-height: 1.5; font-family: 'Jost', sans-serif; transition: border-color 0.15s; }
    #input:focus { border-color: var(--blue); }
    #send-btn { border: none; border-radius: 11px; width: 42px; height: 42px; color: var(--white); font-size: 17px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.2s; background: rgba(0,0,0,0.2); }
    #send-btn.active { background: var(--blue); }
    #send-btn:disabled { opacity: 0.4; cursor: default; }

    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
    ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.2);border-radius:4px}
    textarea::-webkit-scrollbar{display:none}
  </style>
</head>
<body>

<!-- MODE SELECT -->
<div class="screen active" id="screen-mode">
  <div class="ua-label">Urban Arts</div>
  <div class="screen-title">Game On:<br/>AP CSP through Game Design</div>
  <div class="volt-bar"></div>
  <div class="screen-sub">Welcome! Who is joining today?</div>
  <div class="cards">
    <div class="card" onclick="selectMode('student')">
      <div class="card-icon">🎮</div>
      <div class="card-label">I'm a Student</div>
      <div class="card-desc">Get support and hints on Unity, C#, and AP CSP concepts</div>
    </div>
    <div class="card" onclick="selectMode('teacher')">
      <div class="card-icon">📋</div>
      <div class="card-label">I'm a Teacher</div>
      <div class="card-desc">Get direct answers, debugging help, and teaching strategies</div>
    </div>
  </div>
</div>

<!-- CHAT -->
<div id="chat-screen">
  <div id="chat-header">
    <div id="chat-header-left">
      <span id="mode-badge">Mode</span>
      <span id="curriculum-badge">⟳ Loading curriculum…</span>
    </div>
    <div id="chat-actions">
      <button class="hdr-btn" onclick="switchMode()">⇄ Switch Mode</button>
    </div>
  </div>
  <div id="messages"></div>
  <div id="typing">
    <div id="typing-avatar">AI</div>
    <div id="typing-bubble"><span></span><span></span><span></span></div>
  </div>
  <div id="suggestions"></div>
  <div id="input-area">
    <textarea id="input" rows="1" placeholder="Ask a question…"></textarea>
    <button id="send-btn" disabled onclick="sendMessage()">→</button>
  </div>
</div>

<script>
const PROXY = '/api/curriculum';
const API_URL = '/api/curriculum';

const STUDENT_SYSTEM = `You are an expert tutor for "Game On: AP CSP through Game Design" at Urban Arts, a national program. Students are in grades 9-12.

Guide students to discover answers themselves — never give answers directly:
- Ask guiding questions that lead students to the solution
- Break complex problems into smaller steps
- Celebrate correct reasoning
- Give hints as questions, not answers
- Connect concepts to game design examples

If curriculum documents are attached, use them as your primary reference. Otherwise use your built-in knowledge of Unity, C#, and AP CSP.
Tone: warm, encouraging, curious. Use game design analogies.
Format: short paragraphs, C# in markdown code blocks. Keep responses concise.
Always end with a question that moves the student forward.`;

const TEACHER_SYSTEM = `You are an expert teaching assistant for "Game On: AP CSP through Game Design" at Urban Arts, a national program.

Give DIRECT, CLEAR answers. Teachers need fast, actionable help.
Specialize in:
- Debugging Unity/C# errors (NullReferenceException, MissingReferenceException, CS errors, etc.)
- Explaining AP CSP concepts simply with good analogies
- Suggesting hints for students without giving away answers
- Unity file management
- Teaching strategies for game design concepts

Common issues: NullReferenceException, MissingReferenceException, semicolon errors, type conversion, OnCollisionEnter not firing, Input.GetKeyDown not working, GameObject not moving, UI not showing, Visual Studio not opening, student can't find Unity project.

If curriculum documents are attached, use them as your primary reference. Otherwise use your built-in knowledge.
Tone: collegial, practical, efficient. Use numbered steps for debugging.`;

const STUDENT_SUGGESTIONS = ["My player falls through the floor 😭", "What's a variable vs a component?", "How do I make an enemy follow the player?", "I don't get what a loop does", "Why won't my score update?"];
const TEACHER_SUGGESTIONS = ["Student getting NullReferenceException", "Good analogy for variables?", "Student's collision isn't working", "Hints for loops without giving it away", "Student can't find their Unity project"];

let mode = null;
let loadedFiles = [];
let curriculumReady = false;
let messages = [];

function switchMode() {
  messages = [];
  loadedFiles = [];
  curriculumReady = false;
  document.getElementById('chat-screen').style.display = 'none';
  document.getElementById('screen-mode').classList.add('active');
}

function selectMode(m) {
  mode = m;
  document.getElementById('screen-mode').classList.remove('active');
  document.getElementById('chat-screen').style.display = 'flex';

  // Set up header
  document.getElementById('mode-badge').textContent = mode === 'student' ? 'Student' : 'Teacher';
  document.getElementById('curriculum-badge').textContent = '⟳ Loading curriculum…';
  document.getElementById('curriculum-badge').classList.remove('ready');

  // Show greeting immediately
  messages = [];
  document.getElementById('messages').innerHTML = '';
  const greeting = mode === 'student'
    ? `Hey! 👋 I'm your Game On tutor.\n\nWhat are you working on or stuck on today?`
    : `Hey! 👋 I'm your Game On teaching assistant.\n\nWhat do you need help with?`;
  appendMessage('assistant', greeting);
  messages.push({ role: 'assistant', content: greeting });

  // Suggestions
  const sugEl = document.getElementById('suggestions');
  sugEl.innerHTML = '';
  (mode === 'student' ? STUDENT_SUGGESTIONS : TEACHER_SUGGESTIONS).forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'suggestion';
    btn.textContent = s;
    btn.onclick = () => { sugEl.innerHTML = ''; sendMessage(s); };
    sugEl.appendChild(btn);
  });

  document.getElementById('input').placeholder = mode === 'student'
    ? 'Ask about a lesson, concept, or project…'
    : 'Ask about debugging, teaching strategies, or curriculum…';

  // Load curriculum silently in background
  loadCurriculumBackground();
}

async function loadCurriculumBackground() {
  try {
    // Step 1: Get file list
    const res = await fetch(`${PROXY}?action=list`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    const files = data.files || [];

    // Step 2: Load all files silently
    const loaded = [];
    for (const f of files) {
      try {
        const r = await fetch(`${PROXY}?action=fetch&fileId=${encodeURIComponent(f.id)}&mimeType=${encodeURIComponent(f.mimeType)}`);
        if (!r.ok) continue;
        const d = await r.json();
        if (d.base64) loaded.push({ name: f.name, base64: d.base64 });
      } catch { /* silently skip failed files */ }
    }

    if (loaded.length > 0) {
      loadedFiles = loaded;
      curriculumReady = true;
      document.getElementById('curriculum-badge').textContent = `✓ ${loaded.length} curriculum files`;
      document.getElementById('curriculum-badge').classList.add('ready');
    } else {
      document.getElementById('curriculum-badge').textContent = '⚠ Curriculum unavailable';
    }
  } catch {
    document.getElementById('curriculum-badge').textContent = '⚠ Curriculum unavailable';
  }
}

function buildApiMessages() {
  // Attach docs to first user message only
  let docsAttached = false;
  return messages.map(m => {
    if (m.role === 'user' && !docsAttached && loadedFiles.length > 0) {
      docsAttached = true;
      const docs = loadedFiles.map(f => ({
        type: 'document',
        source: { type: 'base64', media_type: 'application/pdf', data: f.base64 }
      }));
      return { role: 'user', content: [...docs, { type: 'text', text: m.content }] };
    }
    return { role: m.role, content: m.content };
  });
}

async function sendMessage(text) {
  const input = document.getElementById('input');
  const userMsg = text || input.value.trim();
  if (!userMsg) return;
  input.value = '';
  updateSendBtn('');
  document.getElementById('suggestions').innerHTML = '';
  messages.push({ role: 'user', content: userMsg });
  appendMessage('user', userMsg);
  const typing = document.getElementById('typing');
  typing.style.display = 'flex';
  document.getElementById('messages').scrollTop = 99999;
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: mode === 'student' ? STUDENT_SYSTEM : TEACHER_SYSTEM,
        messages: buildApiMessages()
      })
    });
    const data = await res.json();
    const reply = data.content?.find(b => b.type === 'text')?.text || 'Something went wrong — please try again.';
    messages.push({ role: 'assistant', content: reply });
    typing.style.display = 'none';
    appendMessage('assistant', reply);
  } catch(e) {
    typing.style.display = 'none';
    appendMessage('assistant', '⚠️ Connection error. Please try again.');
  }
}

function appendMessage(role, content) {
  const el = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (role === 'assistant') {
    const av = document.createElement('div');
    av.className = 'msg-avatar';
    av.textContent = 'AI';
    div.appendChild(av);
  }
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = formatContent(content);
  div.appendChild(bubble);
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function formatContent(text) {
  return text.split(/(```[\s\S]*?```)/g).map(part => {
    if (part.startsWith('```')) {
      const code = part.replace(/^```\w*\n?/, '').replace(/```$/, '');
      return `<pre>${esc(code)}</pre>`;
    }
    return esc(part).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  }).join('');
}

function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function updateSendBtn(val) {
  const btn = document.getElementById('send-btn');
  btn.disabled = !val.trim();
  btn.className = val.trim() ? 'active' : '';
}

document.getElementById('input').addEventListener('input', e => updateSendBtn(e.target.value));
document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
</script>
</body>
</html>
